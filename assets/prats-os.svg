<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">PRATS OS developer console</title>
  <desc id="desc">A custom terminal interface introducing Prateek Mishra, his current projects, tools, and stats.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#090b12"/><stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#a78bfa"/><stop offset=".52" stop-color="#67e8f9"/><stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#94a3b8" opacity=".08"/>
    </pattern>
    <filter id="softGlow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      text{font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace}
      .muted{fill:#64748b}.dim{fill:#94a3b8}.white{fill:#e5e7eb}.cyan{fill:#67e8f9}.green{fill:#86efac}.violet{fill:#a78bfa}.amber{fill:#fbbf24}
      @keyframes blink{50%{opacity:0}}.cursor{animation:blink 1s step-end infinite}
    </style>
  </defs>

  <rect width="1200" height="520" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="22" fill="url(#dots)"/>
  <rect x="1" y="1" width="1198" height="518" rx="21" fill="none" stroke="#334155"/>

  <circle cx="31" cy="29" r="6" fill="#fb7185"/><circle cx="52" cy="29" r="6" fill="#fbbf24"/><circle cx="73" cy="29" r="6" fill="#86efac"/>
  <text x="600" y="35" text-anchor="middle" font-size="13" class="muted">prateek@github — ~/identity</text>
  <path d="M0 58H1200" stroke="#334155"/>

  <g transform="translate(55 92)">
    <text x="0" y="0" font-size="15" class="violet" xml:space="preserve">
      <tspan x="0" dy="0">██████╗ </tspan><tspan x="0" dy="25">██╔══██╗</tspan><tspan x="0" dy="25">██████╔╝</tspan><tspan x="0" dy="25">██╔═══╝ </tspan><tspan x="0" dy="25">██║     </tspan><tspan x="0" dy="25">╚═╝     </tspan>
    </text>
    <text x="142" y="0" font-size="15" class="cyan" xml:space="preserve">
      <tspan x="142" dy="0">███╗   ███╗</tspan><tspan x="142" dy="25">████╗ ████║</tspan><tspan x="142" dy="25">██╔████╔██║</tspan><tspan x="142" dy="25">██║╚██╔╝██║</tspan><tspan x="142" dy="25">██║ ╚═╝ ██║</tspan><tspan x="142" dy="25">╚═╝     ╚═╝</tspan>
    </text>
    <text x="0" y="188" font-size="27" font-weight="700" letter-spacing="4" fill="url(#accent)">PRATS//OS</text>
    <text x="0" y="218" font-size="13" class="dim">builder edition · rolling release</text>

    <rect x="0" y="244" width="324" height="1" fill="#334155"/>
    <text x="0" y="273" font-size="12" class="muted">LOADOUT</text>
    <g font-size="12">
      <rect x="0" y="289" width="59" height="25" rx="5" fill="#1e1b4b" stroke="#6d28d9"/><text x="29" y="306" text-anchor="middle" class="violet">C#</text>
      <rect x="68" y="289" width="66" height="25" rx="5" fill="#082f49" stroke="#0369a1"/><text x="101" y="306" text-anchor="middle" class="cyan">.NET</text>
      <rect x="143" y="289" width="104" height="25" rx="5" fill="#052e2b" stroke="#0f766e"/><text x="195" y="306" text-anchor="middle" class="green">PLAYWRIGHT</text>
      <rect x="256" y="289" width="68" height="25" rx="5" fill="#172033" stroke="#475569"/><text x="290" y="306" text-anchor="middle" class="white">REACT</text>
    </g>
  </g>

  <g transform="translate(470 92)" font-size="14">
    <text x="0" y="0" font-size="18" font-weight="700" class="white">prateek<tspan class="muted">@</tspan><tspan class="cyan">github</tspan></text>
    <text x="0" y="29" class="muted">────────────────────────────────────────────────────────</text>

    <text x="0" y="64" class="violet">ROLE</text><text x="132" y="64" class="white">software engineer / systems builder</text>
    <text x="0" y="94" class="cyan">FOCUS</text><text x="132" y="94" class="white">agents · automation · developer tools</text>
    <text x="0" y="124" class="green">CURRENT</text><text x="132" y="124" class="white">PratsPilot</text><text x="275" y="124" class="green">● RUNNING</text>
    <text x="0" y="154" class="amber">TESTS</text><text x="132" y="154" class="white">64 scenarios across desktop + mobile</text>
    <text x="0" y="184" class="violet">MOOD</text><text x="132" y="184" class="white">curious / unreasonably persistent</text>
    <text x="0" y="214" class="cyan">UPTIME</text><text x="132" y="214" class="white">until the next VALORANT queue</text>

    <rect x="0" y="240" width="657" height="118" rx="10" fill="#090d16" stroke="#273449"/>
    <text x="18" y="266" font-size="12" class="muted">LIVE PROCESSES</text>
    <circle cx="20" cy="291" r="4" fill="#86efac" filter="url(#softGlow)"/><text x="36" y="296" font-size="12" class="white">agent-runtime</text><text x="228" y="296" font-size="12" class="muted">tools + context + human gates</text><text x="611" y="296" font-size="12" class="green">RUN</text>
    <circle cx="20" cy="321" r="4" fill="#67e8f9" filter="url(#softGlow)"/><text x="36" y="326" font-size="12" class="white">playwright-lab</text><text x="228" y="326" font-size="12" class="muted">trying very hard to break things</text><text x="599" y="326" font-size="12" class="cyan">64/64</text>
    <circle cx="20" cy="351" r="4" fill="#a78bfa" filter="url(#softGlow)"/><text x="36" y="356" font-size="12" class="white">next-idea</text><text x="228" y="356" font-size="12" class="muted">state: compiling...</text><text x="611" y="356" font-size="12" class="violet">???</text>
  </g>

  <path d="M0 462H1200" stroke="#334155"/>
  <text x="28" y="493" font-size="14" class="green">prateek@github</text><text x="154" y="493" font-size="14" class="muted">:</text><text x="166" y="493" font-size="14" class="cyan">~</text><text x="180" y="493" font-size="14" class="muted">$</text>
  <text x="201" y="493" font-size="14" class="white">./build --useful --reliable --fun</text><rect x="515" y="478" width="9" height="18" rx="1" fill="#86efac" class="cursor"/>
  <text x="1167" y="493" text-anchor="end" font-size="12" class="muted">v22.2.2</text>
</svg>
